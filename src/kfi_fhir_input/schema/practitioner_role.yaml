id: https://carrollaboratory.github.io/kfi-fhir-input/practitioner_role
name: kfi-fhir-input-practitioner-role
imports:
  - linkml:types
  - kfi_fhir_input
  - practitioner
  - institution
  - period
classes:
  PractitionerRole:
    title: Practitioner Role
    description: PractitionerRole covers the recording of the location and types of services that Practitioners are able to provide for an organization.
    # is_a: Record
    annotations:
      fhir_resource: PractitionerRole
    #mixins:
    #  - Period
    slots:
      - practitioner_role_id
      - institution_id
      - practitioner_id
      - period_start # I don't like any of my options with inline/multivalue so just forcing them in
      - period_end
    slot_usage:
      practitioner_role_id:
        identifier: true
        required: true
        range: string

slots:
  practitioner_role_id:
    title: Practitioner Role ID
    description: Global ID for this record
    range: PractitionerRole
    required: false
