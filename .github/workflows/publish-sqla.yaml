name: Publish SQLA Models to GH Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for uv-dynamic-versioning to read git tags

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install project dependencies
        run: uv sync --group dev
        # This installs linkml (and gen-sqla) into .venv,
        # which hatch_build.py will find at .venv/bin/gen-sqla

      - name: Build wheel and sdist
        run: uv build
        # hatch_build.py runs automatically here and generates
        # the SQLAlchemy file using .venv/bin/gen-sqla

      - name: Publish to GitHub Packages
        env:
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.CARROLLABORATORY_PACKAGES_TOKEN }}
          PACKAGE_OWNER: "carrollaboratory"
          PACKAGE_REPOSITORY: "python-packages"
        run: |
          uv tool run twine upload \
            --repository-url https://api.github.com/orgs/$PACKAGE_OWNER/packages/pypi/upload \
            dist/*
