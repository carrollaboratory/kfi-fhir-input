name: Model Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create GitHub Releases and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for uv-dynamic-versioning to read git tags

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install project dependencies
        run: uv sync --group dev --no-progress
        # Installs linkml (gen-sqla, gen-project, etc.) into .venv
        # hatch_build.py will find gen-sqla at .venv/bin/gen-sqla

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Generate all model artifacts
        run: just site
        # Runs gen-project, gen-doc, _gen_ftddd, _gen_sqla, _gen_harmony
        # Produces: project/sqlalchemy/, project/harmony/, project/owl/, etc.

      - name: Build wheel and sdist
        run: uv build
        # Triggers hatch_build.py which bundles the SQLAlchemy file
        # and harmony CSV into the wheel automatically

      - name: Zip full project artifacts
        run: |
          zip -r project-artifacts.zip project/
        # Packages all linkml-generated outputs (jsonschema, owl, typescript,
        # java, sqlalchemy, harmony, etc.) for modelers who need the full set

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: "Release ${{ github.ref_name || inputs.tag }}"
          generate_release_notes: true # Auto-generates notes from commits since last tag
          files: |
            dist/*.whl
            dist/*.tar.gz
            project-artifacts.zip
          fail_on_unmatched_files: true
